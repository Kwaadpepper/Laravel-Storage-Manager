name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup PHP
        uses: shivammathur/setup-php@ea13793c1315cfad792110b0dcc4260bc683b5d4
        with:
          php-version: '8.4'
          tools: cs2pr

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup PHP
        uses: shivammathur/setup-php@ea13793c1315cfad792110b0dcc4260bc683b5d4
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

  tests:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup PHP
        uses: shivammathur/setup-php@ea13793c1315cfad792110b0dcc4260bc683b5d4
        with:
          php-version: '8.4'
          extensions: zip, json
          coverage: xdebug

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests with coverage
        run: vendor/bin/pest --coverage --min=80

  type-coverage:
    name: Type Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup PHP
        uses: shivammathur/setup-php@ea13793c1315cfad792110b0dcc4260bc683b5d4
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run type coverage
        run: vendor/bin/pest --type-coverage --min=100
